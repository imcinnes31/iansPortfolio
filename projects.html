<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Ian's Projects
        </title>
        <style>
            body {
                margin: 0px;
            }
            p, h2 {
                margin-top: 2px;
                margin-bottom: 2px;
            }
            h2 {
                font-size: 30px;
                font-weight: bold;
            }
            span {
                color: lightgreen;
            }
            h2, h4  {
                font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif
            }
            h3, p, a, button {

            h4 {
                font-weight: bold;
                font-size: 20px;
                margin-top: 15px;
                margin-bottom: 15px;
            }
            #linkDiv div {
                width: 25%; 
                display: flex; 
                align-items: center; 
                justify-content: center;
            }
            #linkDiv div p {
                font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                font-size: "11px";
            }
            p, a, button {
                font-size: 18px;
                white-space: pre-wrap;
            }
            button {
                width: 90%;
                height: 40px;
                margin-left: 10px;
                margin-right: 10px;
                color: white;
                border: none;
            }
            a {
                display: flex;
                justify-content: center;
                align-items: center;
                text-decoration: none;
            }
            #linkDiv div a {
                color: black;
            }

            #pageHeader {height: 175px; }
            #nameHeaderContainer {width: 70%}
            #headerSquareContainer {width: 30px}
            #headerSquare {width: 20px; height: 20px}
            #nameHeader {justify-content: center; padding-top: 20px; padding-bottom: 20px}
            #nameHeader h1 {font-size: 60px}
            #nameHeader p {font-size: 40px}
            #linkDiv {width: 30%;}

            #pageFooter {height: 100px;}
            #footerName {display: flex}
            #footerContact {width: 40%}
            #footerContact div img {width: 32px; height: 32px}

            #projectPageHeader h1 {font-size: 36px}
            #blueSquare {width: 20px; height: 20px}
            #pageDesc {font-size: 24px}

            .whiteContainer {width: 75%}
            .projectButtons a {width: 30%}
            .descPane {width: 50%;}
            .picturePane {width: 50%}

            @media only screen and (max-width: 1000px) {
                html {
                    -webkit-text-size-adjust: 100%;
                    text-size-adjust: 100%;
                }

                #pageHeader {flex-direction: column; height: 200px; }
                #nameHeaderContainer {width: 100%}
                #headerSquareContainer {width: 50px}
                #headerSquare {width: 40px; height: 40px}
                #nameHeader {justify-content: center; padding-top: 20px; padding-bottom: 20px}
                #nameHeader h1 {font-size: 48px}
                #nameHeader p {font-size: 36px; margin-top: 8px}
                #linkDiv {width: 100%; padding-top: 20px; border-top: 2px solid black;}
                #linkDiv div {width: 33%}
                #linkDiv div a p {font-size: 48px; }

                #pageFooter {flex-direction: column; height: auto; padding-top: 20px; padding-bottom: 20px}
                #footerName {display: none}
                #footerContact {width: 100%}
                #footerContact div img {width: 60px; height: 60px}
                #footerContact div a {font-size: 28px}

                #projectPageHeader h1 {font-size: 60px}
                #blueSquare {width: 25px; height: 25px}
                #descContainer {width: 90%}
                #pageDesc {font-size: 48px}
                .projectSection h2 {font-size: 60px}
                .whiteContainer {width: 95%}
                .projectContainer {flex-direction: column; align-items: center}
                .projectButtons {padding-top: 10px; padding-bottom: 20px}
                .projectButtons a {width: 50%}
                .projectButtons a button {height: 75px; border-radius: 40px; font-size: 42px}
                .descPane {width: 90%; padding-top: 20px}
                .descPane p {font-size: 48px}
                .descPane p a {font-size: 48px}
                .videoDesc a {font-size: 48px}
                .videoLink {font-size: 48px}
                .picturePane {width: 85%}
                h4 {font-size: 48px}
            }

        </style>
        <script src="codeSamples.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const projectSection = document.getElementById("projectSections");

                for (const project in codeSamples) {
                    const divContainer = document.createElement("div");
                    divContainer.className="projectSection";
                    divContainer.style.width = "100%";
                    divContainer.style.display = "flex";
                    divContainer.style.justifyContent = "center";
                    divContainer.style.flexDirection = "column";
                    const projectHeader = document.createElement("h2");
                    projectHeader.style.textAlign = "center";
                    projectHeader.style.marginTop = "25px";
                    projectHeader.style.marginBottom = "15px";
                    projectHeader.style.textDecoration = "underline";
                    projectHeader.innerHTML = codeSamples[project]["Title"];
                    const projectBody = document.createElement("div");
                    projectBody.style.display = "flex";
                    projectBody.style.justifyContent = "center";
                    const projectDiv = document.createElement("div");
                    projectDiv.className = "whiteContainer";
                    projectDiv.style.display = "flex";
                    projectDiv.style.backgroundColor = "white";
                    projectDiv.style.border = "1px solid black";
                    projectDiv.style.flexDirection = "column";

                    const projectDivUpper = document.createElement("div");
                    projectDivUpper.className="projectContainer";
                    projectDivUpper.style.display = "flex";
                    projectDivUpper.style.width = "100%";
                    projectDivUpper.style.paddingTop = "20px";
                    projectDivUpper.style.paddingBottom = "20px";

                    const projectDivLower = document.createElement("div");
                    projectDivLower.className = "projectButtons";
                    projectDivLower.style.height = "75px";
                    projectDivLower.style.display = "flex";
                    projectDivLower.style.justifyContent = "center";
                    const sampleLink = document.createElement("a");
                    sampleLink.href = "sampleCode.html?appName=" + project;
                    sampleLink.target="_blank";
                    sampleLink.rel="noopener noreferrer";
                    const sampleButton = document.createElement("button");
                    sampleButton.style.backgroundColor = "blue";
                    sampleButton.innerHTML = "Code Sample";
                    sampleLink.appendChild(sampleButton);
                    const downloadLink = document.createElement("a");
                    downloadLink.href = codeSamples[project]["Link"] != null ? codeSamples[project]["Link"] : "javascript:void(0)";
                    const downloadButton = document.createElement("button");
                    downloadButton.style.backgroundColor = codeSamples[project]["Link"] != null ? "darkslategray" : "lightgray";
                    downloadButton.innerHTML = codeSamples[project]["Type"] == "Web" ? "Go To Website" : codeSamples[project]["Link"] != null ? "Download Link" : "Coming Soon";
                    downloadLink.appendChild(downloadButton);
                    projectDivLower.appendChild(sampleLink);
                    projectDivLower.appendChild(downloadLink);

                    const leftPane = document.createElement("div");
                    leftPane.className = "descPane";
                    const appType = document.createElement("h4");
                    appType.innerHTML = codeSamples[project]["Type"] + " Application";
                    leftPane.appendChild(appType);
                    const projectDescription = document.createElement("p");
                    projectDescription.innerHTML = codeSamples[project]["Description"].replaceAll(". ",".  ");
                    leftPane.appendChild(projectDescription);
                    const techDescription = document.createElement("h4");
                    techDescription.innerHTML = "Technologies Used:  " + codeSamples[project]["Technologies"].join(", ");
                    leftPane.appendChild(techDescription);
                    if (codeSamples[project]["YouTube"] != null) {
                        const youTubeDiv = document.createElement("div");
                        youTubeDiv.className = "videoDesc";
                        youTubeDiv.style.display = "flex";
                        const youTubeHeader = document.createElement("h4");
                        youTubeHeader.className = "videoLink";
                        youTubeHeader.style.margin = "0px";
                        youTubeHeader.innerHTML = "Demo Video: ";
                        youTubeDiv.appendChild(youTubeHeader);
                        const youTubeLink = document.createElement("a");
                        youTubeLink.style.marginLeft = "20px";
                        youTubeLink.href = codeSamples[project]["YouTube"];
                        youTubeLink.innerHTML = codeSamples[project]["YouTube"].replace("https://","");
                        youTubeDiv.appendChild(youTubeLink);
                        leftPane.appendChild(youTubeDiv);
                    }
                    if (codeSamples[project]["Instructions"] != null) {
                        const instructionsHeader = document.createElement("h4");
                        instructionsHeader.innerHTML = "Instructions:";
                        leftPane.appendChild(instructionsHeader);
                        const instructions = document.createElement("p");
                        instructions.innerHTML = codeSamples[project]["Instructions"].replaceAll(". ",".  ");
                        leftPane.appendChild(instructions);
                    }

                    const rightPane = document.createElement("div");
                    rightPane.className = "picturePane";
                    rightPane.style.display = "flex";
                    rightPane.style.justifyContent = "center";
                    const projectPic = document.createElement("img");
                    projectPic.src = codeSamples[project]["Picture"];
                    projectPic.style.width = "90%";
                    rightPane.appendChild(projectPic);

                    projectDivUpper.appendChild(rightPane);
                    projectDivUpper.appendChild(leftPane);
                    projectDiv.appendChild(projectDivUpper);
                    projectDiv.appendChild(projectDivLower);
                    projectBody.appendChild(projectDiv);
                    divContainer.appendChild(projectHeader);
                    divContainer.appendChild(projectBody);
                    projectSection.appendChild(divContainer);
                }
            });
        </script>
    </head>
