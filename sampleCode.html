<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Project Code Sample
        </title>
        <style>
            body {
                margin: 0px;
            }
            p, h2 {
                margin-top: 2px;
                margin-bottom: 2px;
            }
            h2 {
                font-size: 28px;
                font-weight: bold;
            }
            span {
                color: lightgreen;
            }
            h2, h4  {
                font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif
            }
            h3, p {
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            }
            h4 {
                font-weight: bold;
                font-size: 20px;
            }
            #linkDiv div {
                width: 25%; 
                display: flex; 
                align-items: center; 
                justify-content: center;
            }
            #linkDiv div p {
                font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                font-size: "11px";
            }

            #codePageHeader h1 {font-size: 36px}
            #blueSquare {width: 20px; height: 20px}
            #codeDescription {font-size: 18px;}
            .codeArea {height: 250px}

            @media only screen and (max-width: 1000px) {
                #codePageHeader h1 {font-size: 60px}
                #blueSquare {width: 25px; height: 25px}
                #codeDescription {font-size: 28px; padding-left: 30px; padding-right: 30px}
                .codeFileHeader {font-size: 28px}
                .codeArea {height: 500px}
            }

        </style>
        <script src="codeSamples.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const params = Object.fromEntries(new URLSearchParams(window.location.search));
                const appName = params["appName"];

                const appInfo = codeSamples[appName]["CodeHeader"].split("\r\n");
                const sampleHeader = "\"" + appInfo[0] + "\"";
                const sampleDescription = appInfo[1];

                const sampleCode = codeSamples[appName]["CodeBody"];
                const mainDiv = document.getElementById("sampleSections");

                document.getElementById("appTitle").innerHTML = sampleHeader;
                document.getElementById("codeDescription").innerHTML = sampleDescription;

                for (const codePage in sampleCode) {
                    const sampleDiv = document.createElement("div");
                    const codeHeaderDiv = document.createElement("div");
                    codeHeaderDiv.style.display = "flex";
                    codeHeaderDiv.style.marginTop = "0px";
                    codeHeaderDiv.style.marginBottom = "0px";
                    codeHeaderDiv.style.justifyContent = "center";
                    const codeHeader = document.createElement("h4");
                    codeHeader.style.width = "90%";
                    codeHeader.className = "codeFileHeader";
                    codeHeader.innerHTML = sampleCode[codePage]["InnerHeader"];
                    codeHeaderDiv.appendChild(codeHeader);
                    sampleDiv.appendChild(codeHeaderDiv);
                    sampleDiv.style.border = "2px solid black";
                    sampleDiv.style.paddingBottom = "20px";
                    sampleDiv.style.backgroundColor = "white";
                    sampleDiv.style.marginTop = "20px";
                    sampleDiv.style.marginBottom = "20px";
                    sampleDiv.style.width = "98%";
                    const codeDiv = document.createElement("div");
                    sampleDiv.appendChild(codeDiv);
                    const codeBodyArea = document.createElement("div");
                    codeBodyArea.style.border = "1px solid black";
                    const codeBodyLines = sampleCode[codePage]["InnerBody"].split("\n");
                    for (const line in codeBodyLines) {
                        if (codeBodyLines[line].includes("//")) {
                            codeBodyLines[line] = codeBodyLines[line].replace("//","<span>//").replace(":<span>//","://");
                            codeBodyLines[line] += "</span>";
                        } else if (codeBodyLines[line].includes("&lt!--")) {
                            codeBodyLines[line] = codeBodyLines[line].replace("&lt!--","<span>&lt!--");
                            codeBodyLines[line] += "</span>";
                        } else if (codeBodyLines[line].includes("#") && appName == "signWizard") {
                            codeBodyLines[line] = codeBodyLines[line].replace("# #","#");
                            codeBodyLines[line] = codeBodyLines[line].replace("#","<span>#");
                            codeBodyLines[line] += "</span>";
                        }
                        const codeBodySingleLine = document.createElement("p");
                        codeBodySingleLine.style.whiteSpace = "pre";
                        codeBodySingleLine.style.fontFamily = "'Consolas', 'Courier New', monospace";
                        codeBodySingleLine.innerHTML = codeBodyLines[line];
                        codeBodyArea.appendChild(codeBodySingleLine);
                    }

                    codeBodyArea.className = "codeArea";
                    codeBodyArea.style.width = "95%";
                    codeBodyArea.style.overflowY = "scroll"; 
                    codeBodyArea.style.backgroundColor = "black";
                    codeBodyArea.style.color = "lightgray";
                    codeDiv.style.display = "flex";
                    codeDiv.style.justifyContent = "center";
                    codeDiv.appendChild(codeBodyArea);
                    mainDiv.appendChild(sampleDiv);
                }
            });
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body style="background-color: lightgray">
        <div style="display: flex; flex-direction: column; align-items: center; background-color: lightgray;">
            <div id="codePageHeader" style="display: inline-flex; margin-bottom: 5px; margin-top: 10px;">
                <div style="width:30px; display: flex; align-items: center; justify-content: center;">
                    <div id="blueSquare" style="background-color: blue;"></div>
                </div>
                <h1 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif; margin-top:0px; margin-bottom:0px;">Code Sample</h1>
            </div>
            <div>
                <h2 id="appTitle"></h2>
            </div>
            <br>
            <div>
                <p id="codeDescription" style="font-size: 18px;"></p>
            </div>
        </div>
        <div id="sampleSections" style="display:flex; flex-direction: column; align-items:center; background-color: lightgray"></div>
    </body>
</html>
